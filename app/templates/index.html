{% extends "layout.html" %}
{% block title %}riptide - Search{% endblock %}
{% block content %}
<h1>riptide</h1>
<p>Search Tidal and Qobuz for artists, albums, or tracks.</p>
<form method="get" action="/search">

  <button type="submit">Search</button>
</form>
<p class="meta">No JS needed.</p>
{% endblock %}
