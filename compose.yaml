name: riptide-lite

services:
  riptide-lite:
    build: .
    container_name: riptide-lite
    restart: unless-stopped
    ports:
      - "19288:19288"
    volumes:
      # Downloads (browseable in web UI) - separate from experimental
      - ./downloads:/app/downloads
      # Auth configs - shared from main repo
      - ../riptide/config/tidal:/app/.config/tidal_dl_ng:ro
      - ../riptide/config/streamrip:/app/.config/streamrip:ro
      # Beets config - separate from experimental
      - ./config/beets:/app/.config/beets
      # Beets library target (shared with Funkwhale via NFS from morpheus)
      - /mnt/gamma/library/music:/music
      # Job state persistence
      - ./data:/app/data
    environment:
      - DOWNLOAD_DIR=/app/downloads
      - LIBRARY_DIR=/music
      - TIDAL_CONFIG_DIR=/app/.config/tidal_dl_ng
      - STREAMRIP_CONFIG_DIR=/app/.config/streamrip
      - FLASK_PORT=19288
